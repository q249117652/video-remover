# VSR Watermark Remover - Docker Compose 编排文件
#
# 用法:
#   # NVIDIA GPU (CUDA 12.6, 推荐 40/50 系显卡) - 默认
#   docker compose up -d
#
#   # NVIDIA GPU (CUDA 11.8, 推荐 20/30 系显卡)
#   docker compose --profile nvidia-cuda11 up -d
#
#   # CPU only
#   docker compose --profile cpu up -d
#

services:
  vsr-watermark-remover:
    profiles: ["default", "gpu", "nvidia-cuda12"]
    build:
      context: .
      dockerfile: docker/Dockerfile.webui
      args:
        CUDA_VERSION: "12.6"
        HARDWARE_ACCELERATOR: cuda
    container_name: vsr-watermark-remover
    ports:
      - "${VSR_PORT:-7860}:7860"
    volumes:
      - vsr_uploads:/vsr/uploads
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - FLORENCE_MODEL=${FLORENCE_MODEL:-microsoft/Florence-2-base-ft}
      - DETECTION_PROMPT=${DETECTION_PROMPT:-watermark}
      - MAX_BBOX_PERCENT=${MAX_BBOX_PERCENT:-10}
      - CONF_THRESHOLD=${CONF_THRESHOLD:-0.3}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  vsr-cuda11:
    profiles: ["nvidia-cuda11"]
    build:
      context: .
      dockerfile: docker/Dockerfile.webui
      args:
        CUDA_VERSION: "11.8"
        HARDWARE_ACCELERATOR: cuda
    container_name: vsr-watermark-remover-cuda11
    ports:
      - "${VSR_PORT:-7860}:7860"
    volumes:
      - vsr_uploads:/vsr/uploads
      - huggingface_cache:/root/.cache/huggingface
    environment:
      - FLORENCE_MODEL=${FLORENCE_MODEL:-microsoft/Florence-2-base-ft}
      - MAX_BBOX_PERCENT=${MAX_BBOX_PERCENT:-10}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  vsr-cpu:
    profiles: ["cpu"]
    build:
      context: .
      dockerfile: docker/Dockerfile.webui
      args:
        HARDWARE_ACCELERATION: cpu
    container_name: vsr-watermark-remover-cpu
    ports:
      - "${VSR_PORT:-7860}:7860"
    volumes:
      - vsr_uploads:/vsr/uploads
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  vsr_uploads:
    driver: local
  huggingface_cache:
    driver: local
