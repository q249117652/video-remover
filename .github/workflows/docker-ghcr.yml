name: Docker Build and Push to GHCR

on:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - type: cuda
            version: "11.8"
            dockerfile: ./docker/Dockerfile
          - type: cuda
            version: "12.6"
            dockerfile: ./docker/Dockerfile
          - type: cpu
            version: "latest"
            dockerfile: ./docker/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=${{ matrix.type }}-${{ matrix.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            CUDA_VERSION=${{ matrix.version }}
            HARDWARD_ACCELERATOR=${{ matrix.type }}
          provenance: false
          sbom: false

      - name: Verify image on GHCR
        run: |
          echo "Image pushed to GHCR:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Verify with: docker pull ${{ steps.meta.outputs.tags }}"
